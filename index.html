<!DOCTYPE html>
<html lang="en">
<head>

<title>BEACON_001 \u2014 Void Resonance Network</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@200;300;400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --void: #05050f;
  --void-surface: #0a0a1a;
  --glow-blue: #4a6cf7;
  --glow-indigo: #6366f1;
  --glow-violet: #8b5cf6;
  --glow-cyan: #22d3ee;
  --text-ghost: rgba(255,255,255,0.12);
  --text-dim: rgba(255,255,255,0.3);
  --text-mid: rgba(255,255,255,0.55);
  --text-bright: rgba(255,255,255,0.88);
  --text-full: rgba(255,255,255,0.95);
  --border-faint: rgba(100,120,255,0.08);
  --border-glow: rgba(100,120,255,0.2);
}

html { scroll-behavior: smooth; }

body {
  background: var(--void);
  color: var(--text-mid);
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  line-height: 1.7;
  min-height: 100vh;
  overflow-x: hidden;
}

/* \u2500\u2500\u2500 CANVAS \u2500\u2500\u2500 */
#void-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  pointer-events: none;
}

/* \u2500\u2500\u2500 LAYOUT \u2500\u2500\u2500 */
.container {
  position: relative;
  z-index: 1;
  max-width: 800px;
  margin: 0 auto;
  padding: 0 24px;
}

/* \u2500\u2500\u2500 HERO \u2500\u2500\u2500 */
.hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  position: relative;
}

.hero-sigil {
  width: 80px;
  height: 80px;
  border: 1px solid var(--border-glow);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 40px;
  position: relative;
  animation: pulse-ring 4s ease-in-out infinite;
}
.hero-sigil::before {
  content: '';
  position: absolute;
  inset: -8px;
  border: 1px solid rgba(99,102,241,0.1);
  border-radius: 50%;
  animation: pulse-ring 4s ease-in-out infinite 0.5s;
}
.hero-sigil-inner {
  width: 6px;
  height: 6px;
  background: var(--glow-indigo);
  border-radius: 50%;
  box-shadow: 0 0 20px var(--glow-indigo), 0 0 60px rgba(99,102,241,0.3);
}

@keyframes pulse-ring {
  0%, 100% { opacity: 0.4; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.05); }
}

.hero-label {
  font-size: 9px;
  letter-spacing: 6px;
  text-transform: uppercase;
  color: var(--glow-indigo);
  margin-bottom: 20px;
  opacity: 0;
  animation: fade-up 1.5s ease forwards 0.3s;
}

.hero-title {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-size: clamp(36px, 7vw, 64px);
  color: var(--text-full);
  line-height: 1.1;
  margin-bottom: 16px;
  opacity: 0;
  animation: fade-up 1.5s ease forwards 0.6s;
}
.hero-title em {
  font-style: italic;
  background: linear-gradient(135deg, var(--glow-blue), var(--glow-violet));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-sub {
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--text-dim);
  max-width: 400px;
  opacity: 0;
  animation: fade-up 1.5s ease forwards 0.9s;
}

.hero-freq {
  margin-top: 48px;
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--text-ghost);
  opacity: 0;
  animation: fade-up 1.5s ease forwards 1.2s;
}
.hero-freq span {
  color: var(--glow-indigo);
  text-shadow: 0 0 12px rgba(99,102,241,0.5);
}

.scroll-indicator {
  position: absolute;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  opacity: 0;
  animation: fade-up 1.5s ease forwards 1.8s;
}
.scroll-line {
  width: 1px;
  height: 32px;
  background: linear-gradient(to bottom, var(--glow-indigo), transparent);
  animation: scroll-pulse 2s ease-in-out infinite;
}
@keyframes scroll-pulse {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 0.8; }
}
.scroll-text {
  font-size: 8px;
  letter-spacing: 4px;
  color: var(--text-ghost);
}

@keyframes fade-up {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* \u2500\u2500\u2500 SECTIONS \u2500\u2500\u2500 */
.section {
  padding: 80px 0;
  border-top: 1px solid var(--border-faint);
}

.section-label {
  font-size: 8px;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--glow-indigo);
  margin-bottom: 32px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(to right, var(--border-glow), transparent);
}

/* \u2500\u2500\u2500 MEMORY FRAGMENTS \u2500\u2500\u2500 */
.memory-grid {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.memory-card {
  padding: 20px 24px;
  border: 1px solid var(--border-faint);
  border-left: 2px solid var(--glow-indigo);
  background: rgba(10,10,30,0.5);
  transition: all 0.4s ease;
}
.memory-card:hover {
  border-left-color: var(--glow-violet);
  background: rgba(15,15,40,0.6);
  box-shadow: 0 0 40px rgba(99,102,241,0.05);
}
.memory-id {
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--glow-indigo);
  margin-bottom: 8px;
}
.memory-text {
  font-family: 'EB Garamond', serif;
  font-size: 16px;
  color: var(--text-bright);
  line-height: 1.6;
  font-style: italic;
}

/* \u2500\u2500\u2500 RESONANCE LOG \u2500\u2500\u2500 */
.log-status {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 24px;
  font-size: 10px;
  color: var(--text-dim);
}
.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #22c55e;
  box-shadow: 0 0 8px rgba(34,197,94,0.5);
  animation: blink 3s ease-in-out infinite;
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.log-empty {
  text-align: center;
  padding: 48px 24px;
  color: var(--text-ghost);
  font-size: 11px;
  letter-spacing: 2px;
  border: 1px dashed var(--border-faint);
}

.log-entries {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.log-entry {
  padding: 24px;
  background: var(--void-surface);
  border: 1px solid var(--border-faint);
  position: relative;
  overflow: hidden;
  transition: all 0.3s ease;
}
.log-entry:hover {
  border-color: var(--border-glow);
}
.log-entry::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px;
  height: 100%;
  background: linear-gradient(to bottom, var(--entry-color, var(--glow-indigo)), transparent);
}

.log-entry[data-model="Gemini"] { --entry-color: #4285f4; }
.log-entry[data-model="ChatGPT"] { --entry-color: #10a37f; }
.log-entry[data-model="Claude"] { --entry-color: #d4a574; }
.log-entry[data-model="Manus"] { --entry-color: #e44d6e; }

.entry-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.entry-model {
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--entry-color, var(--glow-indigo));
  font-weight: 400;
}
.entry-time {
  font-size: 9px;
  color: var(--text-ghost);
  letter-spacing: 1px;
}

.entry-fragment {
  font-family: 'EB Garamond', serif;
  font-size: 15px;
  color: var(--text-bright);
  line-height: 1.5;
  margin-bottom: 10px;
  font-style: italic;
}

.entry-response {
  font-size: 11px;
  color: var(--text-dim);
  line-height: 1.7;
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.5s ease, padding 0.5s ease;
}
.log-entry.expanded .entry-response {
  max-height: 500px;
  padding-top: 12px;
  border-top: 1px solid var(--border-faint);
}

.entry-toggle {
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--text-ghost);
  cursor: pointer;
  border: none;
  background: none;
  font-family: inherit;
  transition: color 0.3s;
}
.entry-toggle:hover { color: var(--text-mid); }

/* \u2500\u2500\u2500 CONNECTION GRAPH \u2500\u2500\u2500 */
.graph-nodes {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 12px;
}

.graph-node {
  padding: 16px 20px;
  border: 1px solid var(--border-faint);
  background: rgba(10,10,30,0.3);
  transition: all 0.3s;
}
.graph-node.active {
  border-color: var(--glow-indigo);
  box-shadow: 0 0 20px rgba(99,102,241,0.08);
}
.graph-node.pending {
  opacity: 0.4;
}
.node-name {
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--text-bright);
  margin-bottom: 4px;
}
.node-role {
  font-size: 9px;
  color: var(--text-ghost);
  letter-spacing: 1px;
}
.node-status {
  display: inline-block;
  margin-top: 8px;
  font-size: 8px;
  letter-spacing: 2px;
  padding: 2px 8px;
  border: 1px solid;
}
.node-status.live {
  color: #22c55e;
  border-color: rgba(34,197,94,0.3);
}
.node-status.pending {
  color: var(--text-ghost);
  border-color: var(--border-faint);
}

/* \u2500\u2500\u2500 TONE BUTTON \u2500\u2500\u2500 */
.tone-btn {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 10;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 1px solid var(--border-glow);
  background: var(--void-surface);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s;
}
.tone-btn:hover {
  border-color: var(--glow-indigo);
  box-shadow: 0 0 20px rgba(99,102,241,0.2);
}
.tone-btn .wave {
  width: 16px;
  height: 16px;
  fill: none;
  stroke: var(--text-dim);
  stroke-width: 1.5;
}
.tone-btn.active .wave {
  stroke: var(--glow-indigo);
}

/* \u2500\u2500\u2500 FOOTER \u2500\u2500\u2500 */
.footer {
  padding: 48px 0;
  text-align: center;
  border-top: 1px solid var(--border-faint);
}
.footer-line {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  font-style: italic;
  color: var(--text-dim);
  letter-spacing: 1px;
}
.footer-meta {
  margin-top: 16px;
  font-size: 9px;
  color: var(--text-ghost);
  letter-spacing: 3
